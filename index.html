<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アルマンドロ語翻訳（デバッグ版）</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 100px; margin: 10px 0; }
button { padding: 10px; margin: 5px; }
#log {
  background: #111;
  color: #0f0;
  padding: 10px;
  height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  font-size: 12px;
}
</style>
</head>
<body>

<h2>日本語 → アルマンドロ語（デバッグ版）</h2>

<textarea id="input" placeholder="日本語入力"></textarea>

<br>

<button onclick="translate()">翻訳</button>

<textarea id="output" placeholder="結果"></textarea>

<h3>デバッグログ</h3>
<div id="log"></div>

<script>
// ===== ログ出力 =====
function log(msg) {
  const logDiv = document.getElementById("log");
  logDiv.textContent += msg + "\n";
  logDiv.scrollTop = logDiv.scrollHeight;
}

// ===== アルマンドロ変換 =====
function toAlmandro(text) {
  log("変換前: " + text);

  let result = text
    .replace(/THE/g, "ЋE")
    .replace(/TH/g, "Ћ")
    .replace(/th/g, "ћ")
    .replace(/de/g, "de")
    .replace(/DE/g, "Œ")
    .replace(/ar/g, "ar")
    .replace(/AR/g, "AR");

  log("変換後: " + result);
  return result;
}

// ===== 翻訳 =====
async function translate() {
  document.getElementById("log").textContent = ""; // ログクリア

  const input = document.getElementById("input").value;
  log("入力: " + input);

  if (!input) {
    log("⚠ 入力が空です");
    return;
  }

  try {
    log("APIリクエスト開始...");

    const url = "https://api.mymemory.translated.net/get?q="
      + encodeURIComponent(input)
      + "&langpair=ja|es";

    log("URL: " + url);

    const res = await fetch(url);
    log("HTTPステータス: " + res.status);

    const data = await res.json();
    log("APIレスポンス: " + JSON.stringify(data));

    if (!data.responseData) {
      log("❌ responseDataが存在しません");
      return;
    }

    let spanish = data.responseData.translatedText;
    log("スペイン語: " + spanish);

    if (!spanish) {
      log("❌ 翻訳結果が空です");
      return;
    }

    let al = toAlmandro(spanish);

    document.getElementById("output").value = al;
    log("✅ 出力完了");

  } catch (e) {
    log("💥 エラー発生: " + e);
  }
}
</script>

</body>
</html>
