<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アルマンドロ語翻訳（自動）</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 100px; margin: 10px 0; }
button { padding: 10px; }
</style>
</head>
<body>

<h2>日本語 → アルマンドロ語（自動）</h2>

<textarea id="input" placeholder="日本語入力"></textarea>
<button onclick="translate()">翻訳</button>
<textarea id="output"></textarea>

<script>
// ===== アルマンドロ変換 =====
function toAlmandro(text) {
  return text
    .replace(/THE/g, "ЋE")
    .replace(/TH/g, "Ћ")
    .replace(/th/g, "ћ")
    .replace(/de/g, "de")
    .replace(/DE/g, "Œ")
    .replace(/ar/g, "ar")
    .replace(/AR/g, "AR");
}

// ===== 翻訳 =====
async function translate() {
  const input = document.getElementById("input").value;
  console.log("入力:", input);

  const res = await fetch("https://api.mymemory.translated.net/get?q=" 
    + encodeURIComponent(input) + "&langpair=ja|es");

  const data = await res.json();
  console.log("API結果:", data);

  let spanish = data.responseData.translatedText;
  console.log("スペイン語:", spanish);

  let al = toAlmandro(spanish);
  console.log("変換後:", al);

  document.getElementById("output").value = al;
}
</script>

</body>
</html>
